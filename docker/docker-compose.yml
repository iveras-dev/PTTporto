version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pttporto-postgres
    environment:
      POSTGRES_DB: pttporto
      POSTGRES_USER: pttporto
      POSTGRES_PASSWORD: pttporto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pttporto"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
