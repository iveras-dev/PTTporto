<!DOCTYPE html>
<html>
<head>
    <title>PTT WebRTC Audio Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; }
        #status { margin-top: 20px; padding: 10px; background: #f0f0f0; min-height: 150px; overflow-y: auto; max-height: 500px; font-size: 12px; }
        .ptt-button { background: #007bff; color: white; border: none; border-radius: 50%; width: 120px; height: 120px; font-size: 20px; cursor: pointer; }
        .ptt-button:active { background: #dc3545; }
        .log-entry { margin: 2px 0; padding: 2px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>PTT WebRTC Audio Test</h1>
    <div>
        <button onclick="login('test1@test.com', 'test1', 'test123')">Login as Test1</button>
        <button onclick="login('test2@test.com', 'test2', 'test123')">Login as Test2</button>
    </div>
    <div id="status">Not logged in</div>
    <button class="ptt-button" onmousedown="startPTT()" onmouseup="stopPTT()">PTT</button>
    <div id="audio-container"></div>
    
    <script>
        let ws = null;
        let currentUser = null;
        let peerConnections = {};
        let localStream = null;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        function log(message) {
            const status = document.getElementById('status');
            status.innerHTML += '<div class="log-entry">' + new Date().toLocaleTimeString() + ': ' + message + '</div>';
            status.scrollTop = status.scrollHeight;
        }
        
        async function login(email, callsign, password) {
            try {
                const resp = await fetch('http://localhost:8082/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                
                if (data.accessToken) {
                    currentUser = { email, password, ...data };
                    log('Logged in as ' + callsign + ' (ID: ' + data.userId + ')');
                    connectWebSocket();
                } else {
                    log('Login failed: ' + JSON.stringify(data));
                }
            } catch (e) {
                log('Login error: ' + e.message);
            }
        }
        
        function connectWebSocket() {
            if (ws) ws.close();
            
            log('Connecting to WebSocket...');
            ws = new WebSocket(`ws://localhost:8082/ws/ptt/1?token=${encodeURIComponent(currentUser.accessToken)}`);
            
            ws.onopen = () => {
                log('WebSocket connected!');
            };
            
            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    log('Received: ' + JSON.stringify(msg).substring(0, 80) + '...');
                    
                    if (msg.type === 'offer' && msg.userId !== currentUser.userId) {
                        log('Received offer from ' + msg.callsign + ', creating answer...');
                        await handleOffer(msg.userId, msg.callsign, msg.payload);
                    }
                    
                    if (msg.type === 'answer' && msg.userId !== currentUser.userId) {
                        log('Received answer from ' + msg.callsign);
                        await handleAnswer(msg.userId, msg.payload);
                    }
                    
                    if (msg.type === 'ice-candidate' && msg.userId !== currentUser.userId) {
                        await handleIceCandidate(msg.userId, msg.payload);
                    }
                    
                    if (msg.type === 'ptt-start' && msg.callsign !== currentUser.callsign) {
                        log('User ' + msg.callsign + ' started PTT!');
                    }
                } catch (e) {
                    log('Non-JSON message: ' + event.data);
                }
            };
            
            ws.onclose = () => {
                log('WebSocket disconnected');
            };
            
            ws.onerror = (error) => {
                log('WebSocket error: ' + error);
            };
        }
        
        async function handleOffer(fromUserId, fromCallsign, offer) {
            log('Creating peer connection for ' + fromCallsign);
            const pc = new RTCPeerConnection(configuration);
            peerConnections[fromUserId] = pc;
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        userId: currentUser.userId,
                        callsign: currentUser.callsign,
                        payload: event.candidate
                    }));
                }
            };
            
            pc.ontrack = (event) => {
                log('Received remote audio from ' + fromCallsign + '! Setting up audio element...');
                
                // Create or get audio element
                let audioEl = document.getElementById('audio-' + fromUserId);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = 'audio-' + fromUserId;
                    audioEl.autoplay = true;
                    audioEl.controls = true; // Add controls for debugging
                    document.getElementById('audio-container').appendChild(audioEl);
                    log('Created audio element for ' + fromCallsign);
                }
                
                // Set the stream
                const remoteStream = new MediaStream();
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
                audioEl.srcObject = remoteStream;
                
                // Try to play
                audioEl.play().then(() => {
                    log('Audio playing successfully!');
                }).catch(e => {
                    log('Audio play error: ' + e.message + ' - trying user interaction...');
                    // Show play button for user to click
                    audioEl.controls = true;
                });
            };
            
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            ws.send(JSON.stringify({
                type: 'answer',
                userId: fromUserId,
                callsign: currentUser.callsign,
                payload: answer
            }));
            
            log('Sent answer to ' + fromCallsign);
        }
        
        async function handleAnswer(fromUserId, answer) {
            const pc = peerConnections[fromUserId];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                log('Set remote description for user ' + fromUserId);
            }
        }
        
        async function handleIceCandidate(fromUserId, candidate) {
            const pc = peerConnections[fromUserId];
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(candidate));
            }
        }
        
        async function startPTT() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Not connected! Login first.');
                return;
            }
            if (!currentUser) {
                log('Not logged in!');
                return;
            }
            
            // Get microphone access
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('Microphone access granted');
            } catch (e) {
                log('Microphone error: ' + e.message);
                return;
            }
            
            // Create peer connection for sending
            const pc = new RTCPeerConnection(configuration);
            peerConnections[currentUser.userId] = pc;
            
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'ice-candidate',
                        userId: currentUser.userId,
                        callsign: currentUser.callsign,
                        payload: event.candidate
                    }));
                }
            };
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Broadcast offer to all users in channel
            ws.send(JSON.stringify({
                type: 'offer',
                userId: currentUser.userId,
                callsign: currentUser.callsign,
                payload: offer
            }));
            
            // Notify others PTT started
            ws.send(JSON.stringify({ type: 'ptt-start', channelId: 1, callsign: currentUser.callsign }));
            
            log('PTT Started - Broadcasting audio...');
        }
        
        function stopPTT() {
            if (!ws) return;
            
            ws.send(JSON.stringify({ type: 'ptt-stop', channelId: 1, callsign: currentUser.callsign }));
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Close peer connection
            if (peerConnections[currentUser.userId]) {
                peerConnections[currentUser.userId].close();
                delete peerConnections[currentUser.userId];
            }
            
            log('PTT Stopped');
        }
    </script>
</body>
</html>
