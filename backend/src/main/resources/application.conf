ktor {
    deployment {
        port = 8082
        host = "0.0.0.0"
    }
    
    security {
        jwt {
            secret = "pttporto-super-secret-jwt-key-2026-change-in-production"
            issuer = "pttporto-api"
            audience = "pttporto-app"
            realm = "pttporto"
            expirationMs = 3600000 // 1 hour
            refreshExpirationMs = 604800000 // 7 days
        }
    }
    
    cors {
        hosts = ["*"]
        methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        headers = ["Authorization", "Content-Type", "X-Requested-With"]
    }
    
    web {
        clientPath = "./web-client/dist"
        adminPath = "./web-admin/dist"
    }
    
    database {
        url = "jdbc:h2:mem:pttporto;DB_CLOSE_DELAY=-1"
        user = "sa"
        password = ""
    }
}
